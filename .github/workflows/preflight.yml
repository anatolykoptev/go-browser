name: preflight

# Pre-merge build/test gate. Runs on GitHub-hosted `ubuntu-24.04-arm` —
# free unlimited minutes for public repos, and arm64 matches the ARM prod
# boxes this code deploys to (krolik Oracle Cloud ARM).
#
# go-browser's integration tests require a live Chrome (CloakBrowser or a
# local Chromium). They self-skip when no browser is found (see
# chrome_stealth_integration_test.go:acquireSharedBrowser), so `go test -short`
# runs only the pure-logic unit tests + the SSRF/stealth helpers that don't
# need a browser. A nightly job (to be added) can provision Chromium for the
# full integration suite.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: preflight-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          # Fleet policy: CI runs the latest patched toolchain (go.mod is the
          # minimum, not the pin). A pinned go-version-file would fail the
          # gate the day a stdlib CVE lands in a patch release.
          go-version: stable

      # golangci-lint is not pre-installed on ubuntu-24.04-arm. Use the
      # official GitHub action (pinned, checksum-verified) instead of the
      # curl install script — the script's master-branch checksums are
      # unreliable and fail the gate on mismatch (seen live: v2.12.2).
      # golangci-lint v2 requires action v7 (v6 rejects v2 version strings).
      # v2.12.2 is the latest release — v2.1.6 was built with Go 1.24 and
      # can't lint a go1.26 module ("Go language version used to build
      # golangci-lint is lower than the targeted Go version").
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      - name: make preflight
        run: make preflight
