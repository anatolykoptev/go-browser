name: nightly

# Full test suite — the Chrome integration tests (stealth, egress guard,
# context pool, actions, metrics) that the per-PR `preflight` gate skips
# via `go test -short`. They run IN FULL here every night with a real
# Chromium, so the -short split in preflight is a cadence change, NOT
# skip-to-green: nothing is dropped, just moved off the hot PR path.
#
# Runs on GitHub-hosted `ubuntu-24.04-arm` (free for public repos, arm64
# parity with prod). Chromium is NOT pre-installed on this image (unlike
# x64 ubuntu-latest) — installed via apt below.

on:
  schedule:
    - cron: "0 11 * * *"   # 11:00 UTC ≈ 03:00-04:00 America/Los_Angeles (off-peak)
  workflow_dispatch: {}    # manual trigger (e.g. right after merging this)

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  full-test:
    runs-on: ubuntu-24.04-arm
    # Integration tests with Chrome were ~55s warm on a 4-core ARM box;
    # hosted runners may be slower + need to install Chromium, so give
    # generous headroom without letting a real hang run for 6h.
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          # Latest patched toolchain, not go.mod's pin — see preflight.yml.
          go-version: stable

      # ubuntu-24.04-arm does NOT ship Chrome/Chromium (unlike x64).
      # The apt `chromium-browser` package is a snap shim that doesn't
      # work reliably in CI (snap confinement + network issues fetching
      # from ports.ubuntu.com). Playwright's bundled Chromium is a plain
      # binary with no snap/AppArmor issues — rod launches it directly.
      # See https://github.com/actions/partner-runner-images: "Chrome
      # browser" is listed under "omitted from the current image".
      #
      # --with-deps is omitted because it runs apt-get to install system
      # deps (fonts, libs) from ports.ubuntu.com, which is intermittently
      # unreachable from the arm runner. The runner's pre-installed libs
      # are sufficient for headless Chrome in tests.
      - name: Install Chromium (Playwright-bundled)
        run: |
          npx --yes playwright@latest install chromium
          # Find the installed binary and symlink it to a known path
          # so BROWSER_BIN can point to it deterministically.
          BIN=$(find ~/.cache/ms-playwright -name chrome -type f | head -1)
          if [ -z "$BIN" ]; then
            echo "::error::Playwright Chromium binary not found"
            exit 1
          fi
          echo "Found Chromium at: $BIN"
          "$BIN" --version
          echo "BROWSER_BIN=$BIN" >> "$GITHUB_ENV"

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      - name: go test (full suite, no -short)
        env:
          # BROWSER_BIN is set by the Install Chromium step above (Playwright
          # binary path). INTEGRATION=1 overrides the testing.Short() gate
          # so all Chrome-dependent tests run (not skipped).
          INTEGRATION: "1"
        run: go test ./... -v -count=1 -timeout 120s
